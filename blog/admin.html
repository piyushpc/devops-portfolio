<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Generator | DevOps Blog</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-form {
            background: #161b22;
            padding: 2rem;
            border-radius: 8px;
            border: 1px solid #30363d;
            margin-top: 2rem;
        }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; color: var(--accent-color); margin-bottom: 0.5rem; font-size: 0.9rem; }
        input, textarea {
            width: 100%;
            background: #0d1117;
            border: 1px solid #30363d;
            color: white;
            padding: 0.8rem;
            border-radius: 4px;
            font-family: 'Fira Code', monospace;
        }
        button {
            background: var(--success-color);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Fira Code', monospace;
            font-weight: bold;
        }
        #output {
            margin-top: 2rem;
            background: #000;
            padding: 1.5rem;
            border-radius: 4px;
            border: 1px solid var(--accent-color);
            color: var(--success-color);
            white-space: pre-wrap;
            display: none;
        }
        .copy-hint { color: var(--text-secondary); font-size: 0.8rem; margin-top: 1rem; }
    </style>
</head>
<body>
    <header class="terminal-header">
        <div class="terminal-controls">
            <span class="control red"></span>
            <span class="control yellow"></span>
            <span class="control green"></span>
        </div>
        <div class="terminal-title">piyush@devops: ~/blog/admin</div>
        <nav>
            <a href="index.html">cd ..</a>
        </nav>
    </header>

    <main class="container">
        <h1>sudo ./generate_post.sh</h1>
        <p class="comment">// Fill out the details below to generate your new blog post entry.</p>

        <form class="admin-form" id="postForm">
            <div class="form-group">
                <label>Post Date</label>
                <input type="text" id="date" placeholder="2026.04.23" required>
            </div>
            <div class="form-group">
                <label>Tech Stack / Tags</label>
                <input type="text" id="tag" placeholder="#AWS #Terraform #Scaling" required>
            </div>
            <div class="form-group">
                <label>Challenge Title</label>
                <input type="text" id="title" placeholder="e.g., Solving Data Latency in Multi-Region Clusters" required>
            </div>
            <div class="form-group">
                <label>The Challenge (Problem Statement)</label>
                <textarea id="excerpt" rows="3" placeholder="Describe the problem you faced..." required></textarea>
            </div>
            <div class="form-group">
                <label>The Solution (Architectural Fix)</label>
                <textarea id="solution" rows="5" placeholder="Explain your detailed solution and the impact it had..." required></textarea>
            </div>
            <div class="form-group">
                <label>Attach Architecture Image (Filename in /assets/)</label>
                <input type="text" id="image" placeholder="e.g., latency-fix-arch.png">
                <p class="comment" style="font-size: 0.7rem; margin-top: 5px;">// Note: Upload the file to your /assets/ folder manually, then enter the name here.</p>
            </div>
            <button type="submit" style="background: var(--accent-color);">POST CHALLENGE</button>
        </form>

        <div id="output"></div>
        <p id="copyHint" class="copy-hint" style="display:none;">SUCCESS: Challenge block generated. Copy it into <b>blog/posts.js</b> and push to GitHub.</p>
    </main>

    <script>
        document.getElementById('postForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const date = document.getElementById('date').value;
            const tag = document.getElementById('tag').value;
            const title = document.getElementById('title').value;
            const excerpt = document.getElementById('excerpt').value;
            const solution = document.getElementById('solution').value;
            const image = document.getElementById('image').value;
            
            const code = `    {
        date: "${date}",
        tag: "${tag}",
        title: "${title}",
        excerpt: "${excerpt}",
        solution: "${solution.replace(/\n/g, '<br>')}",
        image: "${image ? '../assets/' + image : ''}",
        link: "#"
    },`;
            
            const output = document.getElementById('output');
            output.textContent = code;
            output.style.display = 'block';
            document.getElementById('copyHint').style.display = 'block';
            
            // Scroll to output
            output.scrollIntoView({ behavior: 'smooth' });
        });
    </script>
</body>
</html>
