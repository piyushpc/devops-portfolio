<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Logs | Piyush Chaudhari</title>
    <meta name="description" content="Technical blog about DevOps System Design challenges and solutions.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="terminal-header">
        <div class="terminal-controls">
            <span class="control red"></span>
            <span class="control yellow"></span>
            <span class="control green"></span>
        </div>
        <div class="terminal-title">piyush@devops: ~/blog</div>
        <nav>
            <a href="../index.html">cd ..</a>
            <a href="#posts">ls ./posts</a>
            <a href="admin.html" style="opacity: 0.5;">sudo</a>
        </nav>
    </header>

    <main class="container">
        <section class="intro">
            <h1 class="typing">cat system_design_challenges.txt</h1>
            <p class="comment">// Documenting real-world DevOps hurdles and architectural solutions.</p>
        </section>

        <section id="posts" class="posts-grid">
            <!-- Posts will be injected here by script.js -->
        </section>
    </main>

    <footer>
        <p>exit status: 0</p>
        <p>&copy; 2026 Piyush Chaudhari | DevOps Architect</p>
    </footer>

    <script type="module">
        import blogPosts from './posts.js';
        
        const postsGrid = document.getElementById('posts');
        
        // Fix: Added (post, index) to access the array index
        blogPosts.forEach((post, index) => {
            const article = document.createElement('article');
            article.className = 'post-card';
            article.innerHTML = `
                <div class="post-meta">
                    <span class="date">${post.date}</span>
                    <span class="tag">${post.tag}</span>
                </div>
                <h2 class="post-title">${post.title}</h2>
                <div class="challenge-box">
                    <p class="post-excerpt">${post.excerpt}</p>
                </div>
                <div class="expanded-content" id="content-${index}">
                    <div class="solution-box">
                        <h3>Solution:</h3>
                        <p class="post-solution">${post.solution}</p>
                    </div>
                    ${post.image ? `<div class="post-image"><img src="${post.image}" alt="Architecture Diagram" style="width:100%"></div>` : ''}
                </div>
                <button class="read-more" onclick="togglePost(${index})" id="btn-${index}">read_more()</button>
            `;
            postsGrid.appendChild(article);
        });

        // Fix: Attach to window so onclick can find it (Modules are not global)
        window.togglePost = function(index) {
            const content = document.getElementById(`content-${index}`);
            const btn = document.getElementById(`btn-${index}`);
            if (content.style.display === 'block') {
                content.style.display = 'none';
                btn.innerText = 'read_more()';
            } else {
                content.style.display = 'block';
                btn.innerText = 'show_less()';
            }
        };
    </script>

</body>
</html>
